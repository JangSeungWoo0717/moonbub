<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세특 프로젝트 모음</title>
  <style>
    :root {
      --bg: #0f1226; --surface: #1a1f3d; --surface-2: #232a52;
      --text: #e8eaf6; --muted: #9aa0c3; --accent: #5b8cff; --accent-2: #00d4a0;
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: system-ui, -apple-system, "Malgun Gothic", sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1c2350, var(--bg));
      color: var(--text); display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }
    header { text-align: center; margin-bottom: 28px; }
    header h1 { font-size: 1.8rem; margin: 0; }
    header p { color: var(--muted); margin: 8px 0 0; }
    .cards { display: grid; gap: 16px; width: 100%; max-width: 760px; }
    .card {
      display: block; text-decoration: none; color: inherit;
      background: var(--surface); border: 1px solid var(--surface-2);
      border-radius: var(--radius); padding: 22px;
      transition: transform .15s ease, border-color .15s ease;
    }
    .card:hover { transform: translateY(-3px); border-color: var(--accent); }
    .card .emoji { font-size: 2rem; }
    .card h2 { margin: 8px 0 4px; font-size: 1.25rem; }
    .card .subject { display: inline-block; font-size: 0.78rem; color: var(--accent-2);
      background: var(--surface-2); padding: 3px 10px; border-radius: 999px; margin-bottom: 8px; }
    .card p { color: var(--muted); margin: 0; font-size: 0.92rem; line-height: 1.55; }
    footer { margin-top: 28px; color: var(--muted); font-size: 0.8rem; text-align: center; }
    @media (min-width: 640px) { .cards { grid-template-columns: 1fr 1fr; } header h1 { font-size: 2.2rem; } }
  </style>
</head>
<body>
  <header>
    <h1>🎓 세특 프로젝트 모음</h1>
    <p>과목별 탐구 산출물 · 게임학과 지망</p>
  </header>
  <div class="cards">
    <a class="card" href="국어/">
      <div class="emoji">🎯</div>
      <span class="subject">국어 · 고1</span>
      <h2>논리 퀘스트</h2>
      <p>논증을 분해·시각화·점수화하고 랭크·배지·퀘스트로 성장하는 논리 트레이닝 게임.</p>
    </a>
    <a class="card" href="수학/">
      <div class="emoji">🎲</div>
      <span class="subject">수학 · 고1</span>
      <h2>확률의 설계자</h2>
      <p>게임 뽑기(가챠) 확률을 기댓값·누적확률·시뮬레이션으로 분석하는 확률 실험실.</p>
    </a>
  </div>
  <footer>Made for 학생부종합전형 세특 · GitHub Pages 정적 배포</footer>
</body>
</html>
